version: "3.9"

services:

  mysql:
    image: mysql:8.0
    container_name: estate_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: estateflow
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: estate_backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - mysql
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: estate_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mysql_data: