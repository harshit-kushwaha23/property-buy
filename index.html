<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EstateFlow</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}

body{
background:linear-gradient(to bottom,#f8fbff,#eef3f8);
color:#1f2937;
}

a{
text-decoration:none;
color:inherit;
}

.navbar{
height:76px;
background:rgba(255,255,255,.9);
backdrop-filter:blur(12px);
display:flex;
justify-content:space-between;
align-items:center;
padding:0 50px;
box-shadow:0 4px 20px rgba(0,0,0,.04);
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:30px;
font-weight:800;
color:#2563eb;
}

.nav-right{
display:flex;
gap:18px;
align-items:center;
}

.profile-btn{
padding:12px 18px;
background:#2563eb;
color:white;
border-radius:14px;
box-shadow:0 6px 16px rgba(37,99,235,.28);
}

.hero{
padding:45px 50px 20px;
}

.hero h1{
font-size:48px;
margin-bottom:15px;
line-height:1.1;
}

.hero p{
color:#64748b;
margin-bottom:30px;
font-size:17px;
}

.search-row{
display:flex;
gap:15px;
align-items:center;
flex-wrap:wrap;
}

.search-box{
flex:1;
min-width:300px;
}

.search-box input{
width:100%;
padding:17px 20px;
border:none;
background:white;
border-radius:16px;
box-shadow:0 6px 15px rgba(0,0,0,.05);
font-size:16px;
}

.sort-box select{
padding:17px;
border:none;
border-radius:16px;
background:white;
box-shadow:0 6px 15px rgba(0,0,0,.05);
}

.layout{
display:grid;
grid-template-columns:280px 1fr;
gap:30px;
padding:30px 50px 70px;
}

.sidebar{
background:white;
padding:25px;
border-radius:24px;
height:fit-content;
box-shadow:0 8px 25px rgba(0,0,0,.05);
}

.sidebar h3{
margin-bottom:20px;
font-size:24px;
}

.filter-group{
margin-bottom:30px;
}

.filter-group h4{
margin-bottom:12px;
}

.category{
display:flex;
flex-direction:column;
gap:12px;
color:#475569;
}

.range{
width:100%;
}

.properties-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(330px,1fr));
gap:28px;
}

.card{
background:white;
border-radius:26px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.05);
transition:.28s;
}

.card:hover{
transform:translateY(-7px);
}

.card img{
width:100%;
height:245px;
object-fit:cover;
}

.card-body{
padding:22px;
}

.price{
font-size:25px;
font-weight:800;
color:#2563eb;
margin-bottom:8px;
}

.title{
font-size:22px;
font-weight:700;
margin-bottom:8px;
}

.meta{
display:flex;
gap:16px;
margin:16px 0;
color:#64748b;
font-size:14px;
flex-wrap:wrap;
}

.badge{
display:inline-block;
padding:8px 13px;
background:#eff6ff;
color:#2563eb;
border-radius:30px;
font-size:13px;
margin-bottom:16px;
font-weight:600;
}

.btn-row{
display:flex;
gap:12px;
}

.btn{
flex:1;
padding:13px;
border-radius:14px;
text-align:center;
font-weight:700;
border:none;
cursor:pointer;
transition:.2s;
}

.primary{
background:#2563eb;
color:white;
box-shadow:0 6px 18px rgba(37,99,235,.25);
}

.primary:hover{
transform:translateY(-2px);
}

.secondary{
background:#eef2f7;
}

.secondary:hover{
background:#dfe7ef;
}

.saved{
background:#dcfce7 !important;
color:#166534;
}

.toast{
position:fixed;
right:30px;
bottom:30px;
background:#111827;
color:white;
padding:15px 22px;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,.18);
opacity:0;
transform:translateY(25px);
transition:.35s;
z-index:9999;
font-weight:500;
}

.toast.show{
opacity:1;
transform:translateY(0);
}

@media(max-width:900px){
.layout{
grid-template-columns:1fr;
}
.hero h1{
font-size:38px;
}
}
</style>
</head>
<body>

<nav class="navbar">
<div class="logo">EstateFlow</div>

<div class="nav-right">
<a href="profile/index.html">Profile</a>

<a class="profile-btn"
href="profile/index.html">
Hi, Alex
</a>
</div>
</nav>


<section class="hero">
<h1>Find Your Next Dream Property</h1>
<p>15 curated premium listings with filters, search and simulated buying.</p>

<div class="search-row">
<div class="search-box">
<input id="searchInput"
placeholder="Search by city, property or feature...">
</div>

<div class="sort-box">
<select id="sortSelect">
<option value="">Sort By</option>
<option value="low">Price Low → High</option>
<option value="high">Price High → Low</option>
<option value="recentDesc">Recently Updated ↓</option>
<option value="recentAsc">Recently Updated ↑</option>
</select>
</div>
</div>
</section>



<div class="layout">

<aside class="sidebar">

<h3>Filters</h3>

<div class="filter-group">
<h4>Max Price</h4>

<input
class="range"
type="range"
min="5000000"
max="40000000"
step="1000000"
value="40000000"
id="priceRange"
>

<p style="margin-top:12px;">
₹ <span id="priceValue">4 Cr</span>
</p>
</div>


<div class="filter-group">
<h4>Category</h4>

<div class="category">
<label><input type="checkbox" value="Flat" class="cat"> Flat</label>

<label><input type="checkbox" value="Villa" class="cat"> Villa</label>

<label><input type="checkbox" value="Penthouse" class="cat"> Penthouse</label>

<label><input type="checkbox" value="Townhouse" class="cat"> Townhouse</label>
</div>

</div>
</aside>



<main>
<div class="properties-grid" id="propertiesGrid"></div>
</main>

</div>


<div class="toast" id="toast"></div>


<script>

const properties=[
{id:1,name:"Ocean View Penthouse",price:38000000,location:"Mumbai",category:"Penthouse",beds:4,baths:4,area:3200,updated:"2026-04-10",images:["images/house1.jpg","images/house2.jpg","images/house3.jpg"],feature:"Sea Facing"},
{id:2,name:"Luxury Urban Flat",price:12000000,location:"Pune",category:"Flat",beds:3,baths:2,area:1650,updated:"2026-04-14",images:["images/house4.jpg","images/house5.jpg","images/house6.jpg"],feature:"Metro Nearby"},
{id:3,name:"Palm Grove Villa",price:25000000,location:"Goa",category:"Villa",beds:5,baths:4,area:4000,updated:"2026-04-03",images:["images/house7.jpg","images/house8.jpg","images/house9.jpg"],feature:"Private Pool"},
{id:4,name:"Skyline Penthouse",price:34000000,location:"Delhi",category:"Penthouse",beds:4,baths:4,area:3000,updated:"2026-04-20",images:["images/house10.jpg","images/house11.jpg"],feature:"Terrace Garden"},
{id:5,name:"Lakeview Villa",price:29000000,location:"Bangalore",category:"Villa",beds:5,baths:5,area:4500,updated:"2026-04-02",images:["images/house12.jpg","images/house13.jpg"],feature:"Lake Facing"},
{id:6,name:"Minimal Smart Flat",price:9500000,location:"Hyderabad",category:"Flat",beds:2,baths:2,area:1300,updated:"2026-04-22",images:["images/house14.jpg","images/house15.jpg"],feature:"Smart Home"},
{id:7,name:"Elite Townhouse",price:17000000,location:"Ahmedabad",category:"Townhouse",beds:3,baths:3,area:2100,updated:"2026-04-05",images:["images/house16.jpg","images/house17.jpg"],feature:"Gated Community"},
{id:8,name:"Garden Flat",price:8500000,location:"Chennai",category:"Flat",beds:2,baths:2,area:1200,updated:"2026-04-19",images:["images/house18.jpg","images/house19.jpg"],feature:"Garden View"},
{id:9,name:"Royal Villa",price:31000000,location:"Jaipur",category:"Villa",beds:6,baths:5,area:5000,updated:"2026-04-07",images:["images/house20.jpg","images/house21.jpg"],feature:"Heritage Style"},
{id:10,name:"Luxury Flat Central",price:14000000,location:"Mumbai",category:"Flat",beds:3,baths:2,area:1700,updated:"2026-04-17",images:["images/house22.jpg","images/house23.jpg"],feature:"City Center"},
{id:11,name:"Riverfront Villa",price:26000000,location:"Surat",category:"Villa",beds:4,baths:4,area:3800,updated:"2026-04-11",images:["images/house24.jpg","images/house25.jpg"],feature:"Riverfront"},
{id:12,name:"Modern Townhouse",price:15500000,location:"Indore",category:"Townhouse",beds:3,baths:3,area:2200,updated:"2026-04-15",images:["images/house26.jpg","images/house27.jpg"],feature:"Corner Unit"},
{id:13,name:"Elite Penthouse",price:36000000,location:"Mumbai",category:"Penthouse",beds:5,baths:5,area:3400,updated:"2026-04-01",images:["images/house28.jpg","images/house29.jpg"],feature:"Infinity Deck"},
{id:14,name:"Budget Smart Flat",price:7500000,location:"Nagpur",category:"Flat",beds:2,baths:2,area:1100,updated:"2026-04-23",images:["images/house30.jpg","images/house31.jpg"],feature:"Affordable Luxury"},
{id:15,name:"Premium Family Villa",price:23000000,location:"Pune",category:"Villa",beds:4,baths:4,area:3700,updated:"2026-04-08",images:["images/house32.jpg","images/house33.jpg"],feature:"Clubhouse Access"}
];

function formatPrice(v){
return "₹"+(v/10000000).toFixed(2)+" Cr";
}

function toastMsg(text){
let t=document.getElementById("toast");

t.textContent=text;
t.classList.add("show");

setTimeout(()=>{
t.classList.remove("show");
},2500);
}

function bookmark(id,btn){

let b=JSON.parse(
localStorage.getItem("bookmarks")
)||[];

if(!b.includes(id)){

b.push(id);

localStorage.setItem(
"bookmarks",
JSON.stringify(b)
);

btn.textContent="Saved ✓";
btn.classList.add("saved");

toastMsg("Property bookmarked");

}else{
toastMsg("Already in bookmarks");
}

}

function render(list){

const saved=
JSON.parse(
localStorage.getItem("bookmarks")
)||[];

propertiesGrid.innerHTML=
list.map(p=>`

<div class="card">

<img src="${p.images[0]}">

<div class="card-body">

<div class="price">
${formatPrice(p.price)}
</div>

<div class="title">
${p.name}
</div>

<div class="badge">
${p.category} • ${p.feature}
</div>

<div class="meta">
<span>${p.beds} Beds</span>
<span>${p.baths} Baths</span>
<span>${p.area} sqft</span>
<span>${p.location}</span>
</div>

<div class="btn-row">

<a
href="property/index.html?id=${p.id}"
class="btn primary">
View Property
</a>

<button
onclick="bookmark(${p.id},this)"
class="btn secondary ${saved.includes(p.id)?'saved':''}">
${saved.includes(p.id)?'Saved ✓':'Bookmark'}
</button>

</div>

</div>
</div>

`).join("");

}


function applyFilters(){

let filtered=[...properties];

let q=
searchInput.value.toLowerCase();

if(q){
filtered=filtered.filter(p=>
p.name.toLowerCase().includes(q)||
p.location.toLowerCase().includes(q)||
p.feature.toLowerCase().includes(q)
);
}

let max=+priceRange.value;

filtered=
filtered.filter(
p=>p.price<=max
);

let cats=
[...document.querySelectorAll(".cat:checked")]
.map(c=>c.value);

if(cats.length){
filtered=
filtered.filter(
p=>cats.includes(p.category)
);
}

let sort=sortSelect.value;

if(sort==="low")
filtered.sort((a,b)=>a.price-b.price);

if(sort==="high")
filtered.sort((a,b)=>b.price-a.price);

if(sort==="recentDesc")
filtered.sort((a,b)=>
new Date(b.updated)-new Date(a.updated)
);

if(sort==="recentAsc")
filtered.sort((a,b)=>
new Date(a.updated)-new Date(b.updated)
);

render(filtered);

}


render(properties);

searchInput.oninput=applyFilters;
sortSelect.onchange=applyFilters;

document.querySelectorAll(".cat")
.forEach(c=>c.onchange=applyFilters);

priceRange.oninput=function(){
priceValue.textContent=
(this.value/10000000).toFixed(1)+" Cr";

applyFilters();
}

</script>

</body>
</html>
