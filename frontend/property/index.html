<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Property</title>

<style>
body{
font-family:Arial;
background:#f7faff;
margin:0
}
.topbar{
padding:20px 50px;
display:flex;
justify-content:space-between;
background:white
}
.wrapper{
max-width:1300px;
margin:auto;
padding:40px
}
.container{
display:grid;
grid-template-columns:1.4fr .8fr;
gap:30px
}
.gallery,.info{
background:white;
padding:30px;
border-radius:30px
}
.gallery img{
width:100%;
height:620px;
object-fit:cover;
border-radius:25px
}
.thumb-row{
display:flex;
gap:10px;
margin-top:15px
}
.thumb{
width:120px;
height:80px;
cursor:pointer
}
.thumb img{
width:100%;
height:100%;
object-fit:cover;
border-radius:10px
}
.price{
font-size:48px;
color:#2563eb;
font-weight:800
}
button{
width:100%;
margin-top:12px;
padding:16px;
border:none;
border-radius:14px;
font-weight:700;
cursor:pointer
}
.primary{
background:#2563eb;
color:white
}
.secondary{
background:#eef2f7
}
.toast{
position:fixed;
right:30px;
bottom:30px;
background:#111827;
color:white;
padding:14px 18px;
border-radius:14px;
opacity:0
}
.show{opacity:1}
</style>
</head>
<body>

<nav class="topbar">
<h2>EstateFlow</h2>
<a href="../index.html">Back</a>
</nav>

<div class="wrapper">

<div class="container">

<div class="gallery">
<img id="mainImg">
<div id="thumbs" class="thumb-row"></div>
</div>

<div class="info">

<h1 id="name"></h1>

<h2 class="price" id="price"></h2>

<p id="city"></p>

<div id="features"></div>

<button
class="primary"
onclick="buy()">
Buy Property
</button>

<button
class="secondary"
onclick="bookmark()">
Bookmark
</button>

<button
class="secondary"
onclick="contactOwner()">
Contact Owner
</button>

</div>

</div>

</div>

<div class="toast" id="toast"></div>


<script>

let p;
let images=[];
let i=0;

function toastMsg(t){
toast.textContent=t;
toast.classList.add("show");

setTimeout(()=>{
toast.classList.remove("show")
},2500)
}

async function loadProperty(){

let id=
new URLSearchParams(
location.search
).get("id");

let res=
await fetch(
"http://localhost:5000/api/properties/"+id
);

p=await res.json();

images=[
"../"+p.image,
"../"+p.image,
"../"+p.image
];

show();

}

function show(){

mainImg.src=images[i];

name.textContent=p.name;

price.textContent=
"₹"+(p.price/10000000).toFixed(2)+" Cr";

city.textContent=p.city;

features.innerHTML=`
<p>${p.beds} Beds</p>
<p>${p.baths} Baths</p>
<p>${p.area} sqft</p>
`;

thumbs.innerHTML=
images.map(
(x,index)=>`
<div
class='thumb'
onclick='goSlide(${index})'>
<img src="${x}">
</div>
`
).join("");

}

function goSlide(x){
i=x;
show();
}

async function bookmark(){

await fetch(
"http://localhost:5000/api/bookmark",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
userId:1,
propertyId:p.id
})
}
);

toastMsg("Bookmarked");

}

async function contactOwner(){

await fetch(
"http://localhost:5000/api/contact",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
userId:1,
propertyId:p.id
})
}
);

toastMsg("Contact request sent");

}

async function buy(){

await fetch(
"http://localhost:5000/api/purchase",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
userId:1,
propertyId:p.id
})
}
);

toastMsg("Purchase simulated");

}

loadProperty();

</script>

</body>
</html>
