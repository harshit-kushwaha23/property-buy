<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Profile Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}

body{
background:linear-gradient(to bottom,#f8fbff,#eef4fb);
color:#1f2937;
}

a{
text-decoration:none;
color:inherit;
}

.topbar{
height:74px;
padding:0 60px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,.9);
backdrop-filter:blur(12px);
box-shadow:0 4px 18px rgba(0,0,0,.04);
position:sticky;
top:0;
z-index:20;
}

.logo{
font-size:28px;
font-weight:800;
color:#2563eb;
}

.back{
background:white;
padding:12px 18px;
border-radius:14px;
box-shadow:0 4px 10px rgba(0,0,0,.05);
}

.wrapper{
max-width:1300px;
margin:auto;
padding:50px 45px 70px;
}

.profile{
background:white;
padding:42px;
border-radius:34px;
box-shadow:0 15px 45px rgba(0,0,0,.05);
}

.header{
display:flex;
justify-content:space-between;
flex-wrap:wrap;
gap:25px;
align-items:center;
margin-bottom:35px;
}

.left{
display:flex;
gap:25px;
align-items:center;
}

.avatar{
width:92px;
height:92px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
font-weight:800;
background:linear-gradient(135deg,#2563eb,#60a5fa);
color:white;
}

.user h1{
font-size:40px;
margin-bottom:8px;
}

.user p{
color:#64748b;
}

.edit{
border:none;
background:#2563eb;
color:white;
padding:14px 20px;
border-radius:14px;
font-weight:600;
cursor:pointer;
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
margin-bottom:35px;
}

.stat{
background:#f8fbff;
padding:24px;
border-radius:22px;
}

.stat h3{
font-size:30px;
color:#2563eb;
margin-bottom:8px;
}

.stat p{
color:#64748b;
}

.tabs{
display:flex;
gap:12px;
flex-wrap:wrap;
margin-bottom:25px;
}

.tab{
padding:14px 20px;
background:#eef2ff;
border-radius:14px;
cursor:pointer;
font-weight:600;
}

.tab.active{
background:#2563eb;
color:white;
}

.panel{
background:#f8fbff;
border-radius:24px;
padding:25px;
min-height:450px;
}

.property-card{
background:white;
border-radius:22px;
overflow:hidden;
display:grid;
grid-template-columns:240px 1fr;
margin-bottom:18px;
box-shadow:0 8px 20px rgba(0,0,0,.04);
}

.property-card img{
width:100%;
height:190px;
object-fit:cover;
}

.info{
padding:24px;
}

.info h3{
font-size:25px;
margin-bottom:10px;
}

.info p{
color:#64748b;
margin-bottom:15px;
}

.tags{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:16px;
}

.tag{
background:#eef5ff;
color:#2563eb;
padding:8px 12px;
border-radius:20px;
font-size:13px;
}

.row{
display:flex;
gap:12px;
flex-wrap:wrap;
}

.btn{
border:none;
padding:11px 16px;
border-radius:12px;
cursor:pointer;
font-weight:600;
}

.primary{
background:#2563eb;
color:white;
}

.danger{
background:#fee2e2;
color:#991b1b;
}

.empty{
text-align:center;
padding:120px 20px;
color:#64748b;
font-size:18px;
}

.actions{
margin-top:20px;
}

.dark-btn{
border:none;
padding:13px 18px;
border-radius:14px;
background:#111827;
color:white;
cursor:pointer;
}

.modal{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.35);
backdrop-filter:blur(8px);
z-index:99;
}

.modal-box{
background:white;
padding:35px;
width:420px;
border-radius:26px;
}

.modal-box h2{
margin-bottom:18px;
}

.modal-box input{
width:100%;
padding:15px;
border:1px solid #dbe2ea;
border-radius:14px;
margin-bottom:18px;
}

.modal-actions{
display:flex;
gap:12px;
}

.modal-actions button{
flex:1;
padding:14px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
}

.save{
background:#2563eb;
color:white;
}

.cancel{
background:#e2e8f0;
}

.toast{
position:fixed;
right:30px;
bottom:30px;
background:#111827;
color:white;
padding:15px 22px;
border-radius:14px;
opacity:0;
transform:translateY(25px);
transition:.35s;
}

.toast.show{
opacity:1;
transform:translateY(0);
}

@media(max-width:1000px){
.stats{
grid-template-columns:1fr 1fr;
}
.property-card{
grid-template-columns:1fr;
}
}
</style>
</head>
<body>

<nav class="topbar">
<div class="logo">EstateFlow</div>
<a class="back" href="../index.html">← Back Home</a>
</nav>

<div class="wrapper">
<div class="profile">

<div class="header">
<div class="left">
<div class="avatar" id="avatar">A</div>

<div class="user">
<h1 id="profileName">Alex Morgan</h1>
<p>Premium Buyer Account</p>
</div>
</div>

<button class="edit" onclick="openModal()">
Edit Profile
</button>
</div>


<div class="stats">
<div class="stat">
<h3 id="savedCount">0</h3>
<p>Saved</p>
</div>

<div class="stat">
<h3 id="contactCount">0</h3>
<p>Contacted</p>
</div>

<div class="stat">
<h3 id="purchaseCount">0</h3>
<p>Purchased</p>
</div>

<div class="stat">
<h3 id="activityCount">0</h3>
<p>Activity</p>
</div>
</div>


<div class="tabs">
<div class="tab active"
id="activityTab"
onclick="loadActivity()">
Activity
</div>

<div class="tab"
id="contactTab"
onclick="loadContacts()">
Contacted
</div>

<div class="tab"
id="bookmarkTab"
onclick="loadBookmarks()">
Bookmarks
</div>

<div class="tab"
id="purchaseTab"
onclick="loadPurchases()">
Purchased
</div>

</div>

<div class="panel" id="content"></div>

<div class="actions">
<button class="dark-btn"
onclick="clearActivity()">
Clear Activity
</button>
</div>

</div>
</div>



<div class="modal" id="modal">
<div class="modal-box">
<h2>Edit Name</h2>

<input id="nameInput">

<div class="modal-actions">
<button class="save"
onclick="saveName()">
Save
</button>

<button class="cancel"
onclick="closeModal()">
Cancel
</button>
</div>

</div>
</div>

<div class="toast" id="toast"></div>


<script>

const properties={
1:{name:"Ocean View Penthouse",img:"../images/house1.jpg",price:"₹3.8 Cr"},
2:{name:"Luxury Urban Flat",img:"../images/house4.jpg",price:"₹1.2 Cr"},
3:{name:"Palm Grove Villa",img:"../images/house7.jpg",price:"₹2.5 Cr"},
4:{name:"Skyline Penthouse",img:"../images/house10.jpg",price:"₹3.4 Cr"},
5:{name:"Lakeview Villa",img:"../images/house12.jpg",price:"₹2.9 Cr"},
6:{name:"Minimal Smart Flat",img:"../images/house14.jpg",price:"₹95 L"},
7:{name:"Elite Townhouse",img:"../images/house16.jpg",price:"₹1.7 Cr"},
8:{name:"Garden Flat",img:"../images/house18.jpg",price:"₹85 L"},
9:{name:"Royal Villa",img:"../images/house20.jpg",price:"₹3.1 Cr"},
10:{name:"Luxury Flat Central",img:"../images/house22.jpg",price:"₹1.4 Cr"},
11:{name:"Riverfront Villa",img:"../images/house24.jpg",price:"₹2.6 Cr"},
12:{name:"Modern Townhouse",img:"../images/house26.jpg",price:"₹1.55 Cr"},
13:{name:"Elite Penthouse",img:"../images/house28.jpg",price:"₹3.6 Cr"},
14:{name:"Budget Smart Flat",img:"../images/house30.jpg",price:"₹75 L"},
15:{name:"Premium Family Villa",img:"../images/house32.jpg",price:"₹2.3 Cr"}
};

function toastMsg(msg){
toast.textContent=msg;
toast.classList.add("show");
setTimeout(()=>{
toast.classList.remove("show");
},2500);
}

function propertyCard(id,label,showRemove=false){

let p=properties[id];

return `
<div class="property-card">
<img src="${p.img}">

<div class="info">
<h3>${p.name}</h3>

<p>${p.price}</p>

<div class="tags">
<div class="tag">${label}</div>
</div>

<div class="row">
<a href="../property/index.html?id=${id}" class="btn primary">
View
</a>

${showRemove?
`<button class="btn danger"
onclick="removeBookmark(${id})">
Remove
</button>`:""}

</div>

</div>
</div>
`;
}

function setActive(id){
document.querySelectorAll(".tab")
.forEach(t=>t.classList.remove("active"));

document.getElementById(id)
.classList.add("active");
}

function updateStats(){

let activity=
JSON.parse(localStorage.getItem("activity"))||[];

let bookmarks=
JSON.parse(localStorage.getItem("bookmarks"))||[];

let contacted=
activity.filter(x=>
x.includes("Contacted owner")
);

let bought=
activity.filter(x=>
x.includes("Purchased")
);

savedCount.textContent=bookmarks.length;
contactCount.textContent=contacted.length;
purchaseCount.textContent=bought.length;
activityCount.textContent=activity.length;

}

function extractId(str){
for(let id in properties){
if(str.includes(properties[id].name)){
return id;
}
}
return null;
}

function loadActivity(){
setActive("activityTab");

let activity=
JSON.parse(localStorage.getItem("activity"))||[];

updateStats();

if(!activity.length){
content.innerHTML=
`<div class="empty">
No activity yet
</div>`;
return;
}

content.innerHTML=
activity.map(item=>{
let id=extractId(item);
return propertyCard(
id,
item.includes("Purchased")
?"Purchased":"Contacted"
);
}).join("");
}

function loadContacts(){

setActive("contactTab");

let activity=
JSON.parse(localStorage.getItem("activity"))||[];

let contacts=
activity.filter(x=>
x.includes("Contacted owner")
);

if(!contacts.length){
content.innerHTML=
`<div class="empty">
No contacted properties
</div>`;
return;
}

content.innerHTML=
contacts.map(item=>{
let id=extractId(item);
return propertyCard(id,"Contacted Owner");
}).join("");
}

function loadPurchases(){

setActive("purchaseTab");

let activity=
JSON.parse(localStorage.getItem("activity"))||[];

let purchases=
activity.filter(x=>
x.includes("Purchased")
);

if(!purchases.length){
content.innerHTML=
`<div class="empty">
No purchased properties
</div>`;
return;
}

content.innerHTML=
purchases.map(item=>{
let id=extractId(item);
return propertyCard(id,"Purchased");
}).join("");
}

function loadBookmarks(){

setActive("bookmarkTab");

let b=
JSON.parse(localStorage.getItem("bookmarks"))||[];

updateStats();

if(!b.length){
content.innerHTML=
`<div class="empty">
No bookmarks yet
</div>`;
return;
}

content.innerHTML=
b.map(id=>
propertyCard(
id,
"Saved",
true
)
).join("");
}

function removeBookmark(id){

let b=
JSON.parse(
localStorage.getItem("bookmarks")
)||[];

b=b.filter(x=>x!=id);

localStorage.setItem(
"bookmarks",
JSON.stringify(b)
);

loadBookmarks();

toastMsg("Bookmark removed");
}

function clearActivity(){
localStorage.removeItem("activity");
loadActivity();
updateStats();
toastMsg("Activity cleared");
}

function loadName(){
let n=
localStorage.getItem("userName")
||"Alex Morgan";

profileName.textContent=n;
avatar.textContent=n[0].toUpperCase();
}

function openModal(){
nameInput.value=
profileName.textContent;

modal.style.display="flex";
}

function closeModal(){
modal.style.display="none";
}

function saveName(){

let n=nameInput.value.trim();

if(!n) return;

localStorage.setItem(
"userName",
n
);

loadName();

closeModal();

toastMsg("Profile updated");
}

window.onclick=function(e){
if(e.target===modal){
closeModal();
}
}

loadName();
updateStats();
loadActivity();

</script>

</body>
</html>
